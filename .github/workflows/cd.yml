# =============================================================================
# CD PIPELINE — Meal Microservice App
# Triggered by: ci.yml (workflow_call) after all CI jobs pass
# Jobs: SSH into EC2 → git pull → npm install → pm2 restart
# Only deploys services that actually changed (passed in as inputs from CI)
# =============================================================================

name: CD

on:
  workflow_call:
    inputs:
      deploy_auth:
        type: boolean
        required: true
      deploy_product:
        type: boolean
        required: true
      deploy_delivery:
        type: boolean
        required: true
      deploy_order:
        type: boolean
        required: true

jobs:

  # ===========================================================================
  # JOB 1 — Deploy UserAuthService
  # ===========================================================================
  deploy-auth:
    name: Deploy — UserAuthService
    runs-on: ubuntu-latest
    if: inputs.deploy_auth == true
    steps:
      - name: Deploy UserAuthService to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ${{ secrets.EC2_USER }}
          key:         ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            echo "==> Pulling latest code..."
            cd /home/ubuntu/Meal-Microservice-App
            git pull origin main

            echo "==> Installing dependencies..."
            cd UserAuthService
            npm ci --omit=dev

            echo "==> Restarting service with PM2..."
            # 'restart' works whether the process is running or not
            # If first deploy, use 'start' fallback
            pm2 describe auth-service > /dev/null 2>&1 \
              && pm2 restart auth-service \
              || pm2 start app.js --name auth-service --cwd /home/ubuntu/Meal-Microservice-App/UserAuthService

            pm2 save
            echo "==> UserAuthService deployed successfully"


  # ===========================================================================
  # JOB 2 — Deploy ProductService
  # ===========================================================================
  deploy-product:
    name: Deploy — ProductService
    runs-on: ubuntu-latest
    if: inputs.deploy_product == true
    steps:
      - name: Deploy ProductService to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ${{ secrets.EC2_USER }}
          key:         ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            echo "==> Pulling latest code..."
            cd /home/ubuntu/Meal-Microservice-App
            git pull origin main

            echo "==> Installing dependencies..."
            cd ProductService
            npm ci --omit=dev

            echo "==> Restarting service with PM2..."
            pm2 describe product-service > /dev/null 2>&1 \
              && pm2 restart product-service \
              || pm2 start app.js --name product-service --cwd /home/ubuntu/Meal-Microservice-App/ProductService

            pm2 save
            echo "==> ProductService deployed successfully"


  # ===========================================================================
  # JOB 3 — Deploy DeliveryService
  # ===========================================================================
  deploy-delivery:
    name: Deploy — DeliveryService
    runs-on: ubuntu-latest
    if: inputs.deploy_delivery == true
    steps:
      - name: Deploy DeliveryService to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ${{ secrets.EC2_USER }}
          key:         ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            echo "==> Pulling latest code..."
            cd /home/ubuntu/Meal-Microservice-App
            git pull origin main

            echo "==> Installing dependencies..."
            cd DeliveryService
            npm ci --omit=dev

            echo "==> Restarting service with PM2..."
            pm2 describe delivery-service > /dev/null 2>&1 \
              && pm2 restart delivery-service \
              || pm2 start app.js --name delivery-service --cwd /home/ubuntu/Meal-Microservice-App/DeliveryService

            pm2 save
            echo "==> DeliveryService deployed successfully"


  # ===========================================================================
  # JOB 4 — Deploy OrderService
  # ===========================================================================
  deploy-order:
    name: Deploy — OrderService
    runs-on: ubuntu-latest
    if: inputs.deploy_order == true
    steps:
      - name: Deploy OrderService to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ${{ secrets.EC2_USER }}
          key:         ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            echo "==> Pulling latest code..."
            cd /home/ubuntu/Meal-Microservice-App
            git pull origin main

            echo "==> Installing dependencies..."
            cd OrderService
            npm ci --omit=dev

            echo "==> Restarting service with PM2..."
            pm2 describe order-service > /dev/null 2>&1 \
              && pm2 restart order-service \
              || pm2 start app.js --name order-service --cwd /home/ubuntu/Meal-Microservice-App/OrderService

            pm2 save
            echo "==> OrderService deployed successfully"


  # ===========================================================================
  # JOB 5 — Verify deployments
  # Runs after all deploy jobs complete (whether they ran or were skipped)
  # Hits the health endpoint to confirm nginx + services are still up
  # ===========================================================================
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-auth, deploy-product, deploy-delivery, deploy-order]
    # Run verify even if some deploy jobs were skipped
    if: always()
    steps:
      - name: Health check
        run: |
          echo "==> Checking service health..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://meal-app.run.place/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed — got HTTP $STATUS"
            exit 1
          fi
          echo "==> Health check passed (HTTP $STATUS)"

      - name: Notify success
        if: success()
        run: echo "All changed services deployed and healthy."

      - name: Notify failure
        if: failure()
        run: echo "Deployment verification failed — check EC2 logs."