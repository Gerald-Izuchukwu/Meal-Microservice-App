# =============================================================================
# CD PIPELINE — Meal Microservice App
# Triggered by: ci.yml (workflow_call) after all CI jobs pass
# Jobs: SSH into EC2 → pull SSM config → git clone/pull → npm ci → pm2 restart
# Only deploys services that actually changed (passed in as inputs from CI)
# =============================================================================

name: CD

on:
  workflow_call:
    inputs:
      deploy_auth:
        type: boolean
        required: true
      deploy_product:
        type: boolean
        required: true
      deploy_delivery:
        type: boolean
        required: true
      deploy_order:
        type: boolean
        required: true

jobs:

  # ===========================================================================
  # JOB 1 — Deploy UserAuthService
  # ===========================================================================
  deploy-auth:
    name: Deploy — UserAuthService
    runs-on: ubuntu-latest
    if: inputs.deploy_auth == true
    steps:
      - name: Deploy UserAuthService to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            echo "==> Ensuring repo is present..."
            if [ -d "/home/ubuntu/Meal-Microservice-App/.git" ]; then
              cd /home/ubuntu/Meal-Microservice-App
              git pull origin main
            else
              git clone https://github.com/Gerald-Izuchukwu/Meal-Microservice-App.git /home/ubuntu/Meal-Microservice-App
              cd /home/ubuntu/Meal-Microservice-App
            fi

            echo "==> Pulling config from SSM..."
            aws ssm get-parameter \
              --name "/meal-app/auth/config.env" \
              --with-decryption \
              --region us-east-1 \
              --query "Parameter.Value" \
              --output text > /home/ubuntu/Meal-Microservice-App/UserAuthService/config.env

            echo "==> Installing dependencies..."
            cd /home/ubuntu/Meal-Microservice-App/UserAuthService
            npm ci --omit=dev

            echo "==> Restarting service with PM2..."
            pm2 describe auth-service > /dev/null 2>&1 \
              && pm2 restart auth-service \
              || pm2 start app.js --name auth-service --cwd /home/ubuntu/Meal-Microservice-App/UserAuthService

            pm2 save
            echo "==> UserAuthService deployed successfully"


  # ===========================================================================
  # JOB 2 — Deploy ProductService
  # ===========================================================================
  deploy-product:
    name: Deploy — ProductService
    runs-on: ubuntu-latest
    if: inputs.deploy_product == true
    steps:
      - name: Deploy ProductService to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            echo "==> Ensuring repo is present..."
            if [ -d "/home/ubuntu/Meal-Microservice-App/.git" ]; then
              cd /home/ubuntu/Meal-Microservice-App
              git pull origin main
            else
              git clone https://github.com/Gerald-Izuchukwu/Meal-Microservice-App.git /home/ubuntu/Meal-Microservice-App
              cd /home/ubuntu/Meal-Microservice-App
            fi

            echo "==> Pulling config from SSM..."
            aws ssm get-parameter \
              --name "/meal-app/product/config.env" \
              --with-decryption \
              --region us-east-1 \
              --query "Parameter.Value" \
              --output text > /home/ubuntu/Meal-Microservice-App/ProductService/config.env

            echo "==> Installing dependencies..."
            cd /home/ubuntu/Meal-Microservice-App/ProductService
            npm ci --omit=dev

            echo "==> Restarting service with PM2..."
            pm2 describe product-service > /dev/null 2>&1 \
              && pm2 restart product-service \
              || pm2 start app.js --name product-service --cwd /home/ubuntu/Meal-Microservice-App/ProductService

            pm2 save
            echo "==> ProductService deployed successfully"


  # ===========================================================================
  # JOB 3 — Deploy DeliveryService
  # ===========================================================================
  deploy-delivery:
    name: Deploy — DeliveryService
    runs-on: ubuntu-latest
    if: inputs.deploy_delivery == true
    steps:
      - name: Deploy DeliveryService to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            echo "==> Ensuring repo is present..."
            if [ -d "/home/ubuntu/Meal-Microservice-App/.git" ]; then
              cd /home/ubuntu/Meal-Microservice-App
              git pull origin main
            else
              git clone https://github.com/Gerald-Izuchukwu/Meal-Microservice-App.git /home/ubuntu/Meal-Microservice-App
              cd /home/ubuntu/Meal-Microservice-App
            fi

            echo "==> Pulling config from SSM..."
            aws ssm get-parameter \
              --name "/meal-app/delivery/config.env" \
              --with-decryption \
              --region us-east-1 \
              --query "Parameter.Value" \
              --output text > /home/ubuntu/Meal-Microservice-App/DeliveryService/config.env

            echo "==> Installing dependencies..."
            cd /home/ubuntu/Meal-Microservice-App/DeliveryService
            npm ci --omit=dev

            echo "==> Restarting service with PM2..."
            pm2 describe delivery-service > /dev/null 2>&1 \
              && pm2 restart delivery-service \
              || pm2 start app.js --name delivery-service --cwd /home/ubuntu/Meal-Microservice-App/DeliveryService

            pm2 save
            echo "==> DeliveryService deployed successfully"


  # ===========================================================================
  # JOB 4 — Deploy OrderService
  # ===========================================================================
  deploy-order:
    name: Deploy — OrderService
    runs-on: ubuntu-latest
    if: inputs.deploy_order == true
    steps:
      - name: Deploy OrderService to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            echo "==> Ensuring repo is present..."
            if [ -d "/home/ubuntu/Meal-Microservice-App/.git" ]; then
              cd /home/ubuntu/Meal-Microservice-App
              git pull origin main
            else
              git clone https://github.com/Gerald-Izuchukwu/Meal-Microservice-App.git /home/ubuntu/Meal-Microservice-App
              cd /home/ubuntu/Meal-Microservice-App
            fi

            echo "==> Pulling config from SSM..."
            aws ssm get-parameter \
              --name "/meal-app/order/config.env" \
              --with-decryption \
              --region us-east-1 \
              --query "Parameter.Value" \
              --output text > /home/ubuntu/Meal-Microservice-App/OrderService/config.env

            echo "==> Installing dependencies..."
            cd /home/ubuntu/Meal-Microservice-App/OrderService
            npm ci --omit=dev

            echo "==> Restarting service with PM2..."
            pm2 describe order-service > /dev/null 2>&1 \
              && pm2 restart order-service \
              || pm2 start app.js --name order-service --cwd /home/ubuntu/Meal-Microservice-App/OrderService

            pm2 save
            echo "==> OrderService deployed successfully"


  # ===========================================================================
  # JOB 5 — Verify deployments
  # Runs after all deploy jobs complete (whether they ran or were skipped)
  # ===========================================================================
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-auth, deploy-product, deploy-delivery, deploy-order]
    if: always()
    steps:
      - name: Health check
        run: |
          echo "==> Checking service health..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://meal-app.run.place/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed — got HTTP $STATUS"
            exit 1
          fi
          echo "==> Health check passed (HTTP $STATUS)"

      - name: Notify success
        if: success()
        run: echo "All changed services deployed and healthy."

      - name: Notify failure
        if: failure()
        run: echo "Deployment verification failed — check EC2 logs."