services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    networks:
      - mynetwork
    ports:
      - 27017:27017
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
  mongo-express:
    image: mongo-express
    container_name: mongo_express
    restart: always
    networks:
      - mynetwork
    ports:
      - 8081:8081
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=root
      - ME_CONFIG_MONGODB_ADMINPASSWORD=example
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true

  rabbitmq:
    image: rabbitmq:3.9-rc-management
    container_name: rabbitmq
    restart: always
    networks:
      - mynetwork
    ports:
      - 5672:5672
      - 15672:15672
    volumes:
      - "./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf"

    healthcheck:
      test: [ "CMD", "rabbitmqctl", "status"]
      interval: 5s
      timeout: 20s
      retries: 5

  order-service:
    image: gerald22/meal_api_orderservice:latest
    container_name: orderservice
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: always
    networks:
      - mynetwork
    ports:
      - 9600:9600
    env_file:
      - ./OrderService/config.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9600/meal-api/v1/order/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  product-service:
    image: gerald22/meal_api_productservice:latest
    container_name: productservice
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: always
    networks:
      - mynetwork
    ports:
      - 9601:9601
    env_file:
      - ./ProductService/config.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9601/meal-api/v1/food/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  user-auth-service:
    image: gerald22/meal_api_authservice:latest
    container_name: authservice
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: always
    networks:
      - mynetwork
    ports:
      - 9602:9602
    env_file:
      - ./UserAuthService/config.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9602/meal-api/v1/auth/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  delivery-service:
    image: gerald22/meal_api_deliveryservice:latest
    container_name: deliveryservice
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: always
    networks:
      - mynetwork
    ports:
      - 9603:9603
    env_file:
      - ./DeliveryService/config.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9603/meal-api/v1/delivery/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:latest
    container_name: nginx-gateway
    restart: always
    networks:
      - mynetwork
    ports:
      - 8084:8084
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      user-auth-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      delivery-service:
        condition: service_healthy
      order-service:
        condition: service_healthy

networks:
  mynetwork:
    driver: bridge
