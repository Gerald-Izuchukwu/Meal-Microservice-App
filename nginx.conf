user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}


http {

    upstream authservice {
        server authservice:9602;
    }

    upstream foodservice {
        server productservice:9601;
    }

    upstream deliveryservice {
        server deliveryservice:9603;
    }

    server {
        listen 8084;
        server_name localhost;

        # User Auth Service Endpoint
        location /meal-api/v1/auth/ {
            proxy_pass http://authservice;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Product Service Endpoint
        location /meal-api/v1/food/ {
            proxy_pass http://foodservice;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Delivery Service Endpoint
        location /meal-api/v1/delivery/ {
            proxy_pass http://deliveryservice;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }


        location / {
            return 200 "Gateway OK\n";
            add_header Content-Type text/plain;
        }

    }
}

